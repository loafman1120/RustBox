name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      external_network:
        description: Also check outbound egress through the proxy to https://example.com
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint: format only, no compilation ──────────────────────────
  lint:
    name: Lint (fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Check formatting
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Fmt

  # ── Build: compile, test, clippy, doc, upload artifact ─────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      - name: Clippy
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Clippy -AllTargets -Locked

      - name: Test
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Test -AllTargets -Locked

      - name: Build docs
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Doc -AllTargets -Locked

      - name: Build CLI
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Build -Locked

      - name: Validate example configs (all)
        shell: pwsh
        run: |
          cargo run --locked -p rustbox-app -- check-config --config examples/rustbox.toml

      - name: Validate TUN config
        if: matrix.os != 'macos-latest'
        run: cargo run --locked -p rustbox-app -- check-config --config examples/tun-transparent.toml

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: rustbox-app-${{ matrix.os }}
          path: |
            target/debug/rustbox-app
            target/debug/rustbox-app.exe
          if-no-files-found: error

  # ── E2E inbound: RustBox as proxy server ────────────────────────
  #     curl → rustbox inbound → direct outbound → target
  e2e-inbound:
    name: E2E inbound (${{ matrix.os }})
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Run inbound e2e
        shell: pwsh
        env:
          RUSTBOX_CI_EXTERNAL: ${{ github.event_name == 'workflow_dispatch' && inputs.external_network == true && '1' || '0' }}
        run: ./scripts/test/proxy.ps1

  # Full TUN data path: curl -> OS TUN -> RustBox -> mock SOCKS5 -> fixed HTTP response.
  e2e-tun-data:
    name: E2E TUN data path (${{ matrix.label }})
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact: rustbox-app-ubuntu-latest
          - os: windows-latest
            label: Windows
            artifact: rustbox-app-windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: target/debug
      - name: Fix permissions (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Download official Wintun 0.14.1
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile $env:RUNNER_TEMP\wintun.zip
          Expand-Archive $env:RUNNER_TEMP\wintun.zip -DestinationPath $env:RUNNER_TEMP\wintun
      - name: Run TUN data path e2e (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: sudo -E "$(command -v pwsh)" -NoLogo -NoProfile -File ./scripts/test/tun.ps1
      - name: Run TUN data path e2e (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RUSTBOX_WINTUN_DLL: ${{ runner.temp }}\wintun\wintun\bin\amd64\wintun.dll
        run: ./scripts/test/tun.ps1

  # ── E2E outbound: RustBox → upstream proxy → target ────────────
  #     curl → rustbox inbound → $outbound → sing-box → target
  e2e-outbound:
    name: E2E out/${{ matrix.outbound }} (${{ matrix.os }})
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        outbound:
          - socks5
          - http
          - shadowsocks
          - anytls
          - vmess
          - vless
          - trojan
    steps:
      - uses: actions/checkout@v7
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app

      - name: Cache sing-box
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/rustbox-ci-sing-box
          key: sing-box-${{ runner.os }}-${{ runner.arch }}-1.13.14

      - name: Run outbound e2e
        shell: pwsh
        env:
          SING_BOX_CACHE_DIR: ${{ runner.temp }}/rustbox-ci-sing-box
          RUSTBOX_SBOX_OUTBOUND: ${{ matrix.outbound }}
          RUSTBOX_E2E_UDP: ${{ matrix.outbound == 'http' && '0' || '1' }}
          RUSTBOX_CI_DUMP_LOGS: ${{ runner.debug == '1' && '1' || '0' }}
        run: ./scripts/test/outbound.ps1

      - name: Upload outbound e2e failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-out-${{ matrix.outbound }}-${{ matrix.os }}-logs
          path: target/ci-singbox-smoke/logs
          if-no-files-found: warn
          retention-days: 7

  # ── E2E gRPC: external grpcurl against control API ───────────
  e2e-grpc:
    name: E2E gRPC (${{ matrix.os }})
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Run gRPC e2e
        shell: pwsh
        run: ./scripts/test/grpc.ps1

  flutter:
    name: Flutter (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            integration_test: true
          - platform: windows
            os: windows-latest
            integration_test: true
          - platform: android
            os: ubuntu-latest
            integration_test: false
          - platform: ios
            os: macos-latest
            integration_test: false
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: flutter-${{ matrix.platform }}
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev xvfb
      - name: Install Android Rust builder
        if: matrix.platform == 'android'
        run: cargo install cargo-ndk --locked
      - name: Install pinned bridge code generator
        if: matrix.platform == 'linux'
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked
      - name: Verify generated bindings are current
        if: matrix.platform == 'linux'
        working-directory: apps/rustbox-flutter
        run: |
          flutter pub get
          flutter_rust_bridge_codegen generate
          cargo fmt --manifest-path rust/Cargo.toml --package rustbox-flutter-bridge
          git diff --exit-code
      - name: Build native library
        shell: pwsh
        run: ./scripts/build/flutter-prebuilt.ps1 -Platform ${{ matrix.platform }} -Locked
      - name: Resolve desktop example dependencies
        if: matrix.integration_test
        working-directory: apps/rustbox-flutter/example
        run: flutter pub get
      - name: Analyze desktop example
        if: matrix.platform == 'linux'
        working-directory: apps/rustbox-flutter/example
        run: |
          dart format --output=none --set-exit-if-changed lib integration_test
          flutter analyze
      - name: Run Windows integration tests
        if: matrix.platform == 'windows'
        working-directory: apps/rustbox-flutter/example
        run: flutter test integration_test/simple_test.dart -d windows
      - name: Run Linux integration tests
        if: matrix.platform == 'linux'
        working-directory: apps/rustbox-flutter/example
        run: xvfb-run -a flutter test integration_test/simple_test.dart -d linux
      - name: Upload native library
        uses: actions/upload-artifact@v7
        with:
          name: rustbox-flutter-native-${{ matrix.platform }}
          path: apps/rustbox-flutter/native/${{ matrix.platform }}
          if-no-files-found: error

  flutter-package:
    name: Flutter pub package
    needs: flutter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: rustbox-flutter-native-linux
          path: apps/rustbox-flutter/native/linux
      - uses: actions/download-artifact@v8
        with:
          name: rustbox-flutter-native-windows
          path: apps/rustbox-flutter/native/windows
      - uses: actions/download-artifact@v8
        with:
          name: rustbox-flutter-native-android
          path: apps/rustbox-flutter/native/android
      - uses: actions/download-artifact@v8
        with:
          name: rustbox-flutter-native-ios
          path: apps/rustbox-flutter/native/ios
      - name: Validate publishable package
        run: |
          cp -R apps/rustbox-flutter "$RUNNER_TEMP/rustbox_flutter"
          cd "$RUNNER_TEMP/rustbox_flutter"
          flutter pub get
          dart pub publish --dry-run
      - name: Upload validated pub package
        uses: actions/upload-artifact@v7
        with:
          name: rustbox-flutter-pub-package
          path: apps/rustbox-flutter
          include-hidden-files: true
