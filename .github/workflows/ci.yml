name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      external_network:
        description: Also check outbound egress through the proxy to https://example.com
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint: format only, no compilation ──────────────────────────
  lint:
    name: Lint (fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
      - name: Check formatting
        shell: pwsh
        run: ./scripts/build.ps1 -Fmt

  # ── Build: compile, test, clippy, doc, upload artifact ─────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      - name: Clippy
        shell: pwsh
        run: ./scripts/build.ps1 -Clippy -AllTargets -Locked

      - name: Test
        shell: pwsh
        run: ./scripts/build.ps1 -Test -AllTargets -Locked

      - name: Build docs
        shell: pwsh
        run: ./scripts/build.ps1 -Doc -AllTargets -Locked

      - name: Build CLI
        shell: pwsh
        run: ./scripts/build.ps1 -Build -Locked

      - name: Validate example configs (all)
        shell: pwsh
        run: |
          cargo run --locked -p rustbox-app -- check-config --config examples/rustbox.toml

      - name: Validate TUN config
        if: matrix.os != 'macos-latest'
        run: cargo run --locked -p rustbox-app -- check-config --config examples/tun-transparent.toml

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rustbox-app-${{ matrix.os }}
          path: |
            target/debug/rustbox-app
            target/debug/rustbox-app.exe
          if-no-files-found: error

  # ── E2E inbound: RustBox as proxy server ────────────────────────
  #     curl → rustbox inbound → direct outbound → target
  e2e-inbound:
    name: E2E inbound (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Run inbound e2e
        shell: pwsh
        env:
          RUSTBOX_CI_EXTERNAL: ${{ github.event_name == 'workflow_dispatch' && inputs.external_network == true && '1' || '0' }}
          RUSTBOX_CI_DUMP_LOGS: "1"
        run: ./scripts/ci/proxy-smoke.ps1
      - name: Upload inbound e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-inbound-logs-${{ matrix.os }}
          path: target/ci-proxy-smoke/logs
          if-no-files-found: ignore

  e2e-tun-windows:
    name: E2E Windows Wintun lifecycle
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tun-e2e-windows
      - name: Download official Wintun 0.14.1
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile $env:RUNNER_TEMP\wintun.zip
          Expand-Archive $env:RUNNER_TEMP\wintun.zip -DestinationPath $env:RUNNER_TEMP\wintun
      - name: Open and close a real Wintun adapter
        shell: pwsh
        env:
          RUSTBOX_TUN_E2E: "1"
          RUSTBOX_WINTUN_DLL: ${{ runner.temp }}\wintun\wintun\bin\amd64\wintun.dll
        run: cargo test --locked -p rustbox-platform-windows tests::opens_and_closes_real_wintun_when_e2e_is_enabled -- --exact --nocapture

  e2e-tun-linux:
    name: E2E Linux TUN lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tun-e2e-linux
      - name: Open and close a real Linux TUN device
        env:
          RUSTBOX_TUN_E2E: "1"
        run: sudo -E "$(command -v cargo)" test --locked -p rustbox-platform-linux tests::opens_and_closes_real_tun_when_e2e_is_enabled -- --exact --nocapture

  # Full TUN data path: curl -> OS TUN -> RustBox -> mock SOCKS5 -> fixed HTTP response.
  e2e-tun-data-windows:
    name: E2E Windows TUN data path
    needs: build
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rustbox-app-windows-latest
          path: target/debug
      - name: Download official Wintun 0.14.1
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile $env:RUNNER_TEMP\wintun.zip
          Expand-Archive $env:RUNNER_TEMP\wintun.zip -DestinationPath $env:RUNNER_TEMP\wintun
      - name: Run TUN data path e2e
        shell: pwsh
        env:
          RUSTBOX_WINTUN_DLL: ${{ runner.temp }}\wintun\wintun\bin\amd64\wintun.dll
          RUSTBOX_CI_DUMP_LOGS: "1"
        run: ./scripts/ci/tun-smoke.ps1
      - name: Upload TUN e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-tun-data-windows-logs
          path: target/ci-tun-smoke/logs
          if-no-files-found: ignore

  e2e-tun-data-linux:
    name: E2E Linux TUN data path
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rustbox-app-ubuntu-latest
          path: target/debug
      - name: Fix permissions
        run: chmod +x target/debug/rustbox-app
      - name: Run TUN data path e2e
        shell: bash
        run: sudo -E "$(command -v pwsh)" -NoLogo -NoProfile -File ./scripts/ci/tun-smoke.ps1
        env:
          RUSTBOX_CI_DUMP_LOGS: "1"
      - name: Upload TUN e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-tun-data-linux-logs
          path: target/ci-tun-smoke/logs
          if-no-files-found: ignore

  # ── E2E outbound: RustBox → upstream proxy → target ────────────
  #     curl → rustbox inbound → $outbound → sing-box → target
  e2e-outbound:
    name: E2E out/${{ matrix.outbound }} (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        outbound:
          - socks5
          - http
          - shadowsocks
          - anytls
          - vmess
          - vless
          - trojan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app

      - name: Cache sing-box
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/rustbox-ci-sing-box
          key: sing-box-${{ runner.os }}-${{ runner.arch }}-1.13.14

      - name: Run outbound e2e
        shell: pwsh
        env:
          SING_BOX_CACHE_DIR: ${{ runner.temp }}/rustbox-ci-sing-box
          RUSTBOX_SBOX_OUTBOUND: ${{ matrix.outbound }}
          RUSTBOX_CI_DUMP_LOGS: "1"
        run: ./scripts/ci/sing-box-smoke.ps1
      - name: Upload outbound e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-outbound-${{ matrix.outbound }}-${{ matrix.os }}
          path: target/ci-singbox-smoke/logs
          if-no-files-found: ignore

  # ── E2E gRPC: external grpcurl against control API ───────────
  e2e-grpc:
    name: E2E gRPC (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Run gRPC e2e
        shell: pwsh
        run: ./scripts/ci/control-grpc-smoke.ps1
