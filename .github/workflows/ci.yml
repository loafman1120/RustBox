name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      external_network:
        description: Also check outbound egress through the proxy to https://example.com
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint: format only, no compilation ──────────────────────────
  lint:
    name: Lint (fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
      - name: Check formatting
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Fmt

  # Compile and execute the public lifecycle ABI inside Android, as an app would.
  e2e-ffi-android:
    name: E2E FFI lifecycle (Android x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust and cargo-ndk
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo install cargo-ndk --locked
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ffi-e2e-android
      - name: Run lifecycle consumer in Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          disable-animations: true
          script: pwsh -NoLogo -NoProfile -File ./scripts/test/ffi.ps1 -Platform Android
      - name: Upload Android library
        uses: actions/upload-artifact@v7
        with:
          name: rustbox-ffi-android-x86_64
          path: dist/android/x86_64/librustbox_ffi.so
          if-no-files-found: error

  # Build the same C lifecycle consumer against the iOS static library and run
  # it inside an arm64 iOS Simulator. The release build also assembles the
  # XCFramework consumed by Flutter.
  e2e-ffi-ios:
    name: E2E FFI lifecycle (iOS arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ffi-e2e-ios
      - name: Run lifecycle consumer in iOS Simulator
        shell: pwsh
        run: ./scripts/test/ffi.ps1 -Platform IOS
      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v7
        with:
          name: rustbox-ffi-ios-xcframework
          path: dist/ios/RustBoxFFI.xcframework
          if-no-files-found: error

  # ── Build: compile, test, clippy, doc, upload artifact ─────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      - name: Clippy
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Clippy -AllTargets -Locked

      - name: Test
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Test -AllTargets -Locked

      - name: Build docs
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Doc -AllTargets -Locked

      - name: Build CLI
        shell: pwsh
        run: ./scripts/build/rust.ps1 -Build -Locked

      - name: Validate example configs (all)
        shell: pwsh
        run: |
          cargo run --locked -p rustbox-app -- check-config --config examples/rustbox.toml

      - name: Validate TUN config
        if: matrix.os != 'macos-latest'
        run: cargo run --locked -p rustbox-app -- check-config --config examples/tun-transparent.toml

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: rustbox-app-${{ matrix.os }}
          path: |
            target/debug/rustbox-app
            target/debug/rustbox-app.exe
          if-no-files-found: error

  # ── E2E inbound: RustBox as proxy server ────────────────────────
  #     curl → rustbox inbound → direct outbound → target
  e2e-inbound:
    name: E2E inbound (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Run inbound e2e
        shell: pwsh
        env:
          RUSTBOX_CI_EXTERNAL: ${{ github.event_name == 'workflow_dispatch' && inputs.external_network == true && '1' || '0' }}
        run: ./scripts/test/proxy.ps1

  e2e-tun-lifecycle:
    name: E2E TUN lifecycle (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            cache_key: tun-e2e-linux
          - os: windows-latest
            label: Windows
            cache_key: tun-e2e-windows
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
      - name: Download official Wintun 0.14.1
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile $env:RUNNER_TEMP\wintun.zip
          Expand-Archive $env:RUNNER_TEMP\wintun.zip -DestinationPath $env:RUNNER_TEMP\wintun
      - name: Open and close a real Linux TUN device
        if: matrix.os == 'ubuntu-latest'
        env:
          RUSTBOX_TUN_E2E: "1"
        run: sudo -E "$(command -v cargo)" test --locked -p rustbox-platform current::packet_device::tests::opens_and_closes_real_tun_when_e2e_is_enabled -- --exact --nocapture
      - name: Open and close a real Wintun adapter
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RUSTBOX_TUN_E2E: "1"
          RUSTBOX_WINTUN_DLL: ${{ runner.temp }}\wintun\wintun\bin\amd64\wintun.dll
        run: cargo test --locked -p rustbox-platform current::packet_device::tests::opens_and_closes_real_wintun_when_e2e_is_enabled -- --exact --nocapture

  # Full TUN data path: curl -> OS TUN -> RustBox -> mock SOCKS5 -> fixed HTTP response.
  e2e-tun-data:
    name: E2E TUN data path (${{ matrix.label }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact: rustbox-app-ubuntu-latest
          - os: windows-latest
            label: Windows
            artifact: rustbox-app-windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: target/debug
      - name: Fix permissions (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Download official Wintun 0.14.1
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile $env:RUNNER_TEMP\wintun.zip
          Expand-Archive $env:RUNNER_TEMP\wintun.zip -DestinationPath $env:RUNNER_TEMP\wintun
      - name: Run TUN data path e2e (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: sudo -E "$(command -v pwsh)" -NoLogo -NoProfile -File ./scripts/test/tun.ps1
      - name: Run TUN data path e2e (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RUSTBOX_WINTUN_DLL: ${{ runner.temp }}\wintun\wintun\bin\amd64\wintun.dll
        run: ./scripts/test/tun.ps1

  # ── E2E outbound: RustBox → upstream proxy → target ────────────
  #     curl → rustbox inbound → $outbound → sing-box → target
  e2e-outbound:
    name: E2E out/${{ matrix.outbound }} (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        outbound:
          - socks5
          - http
          - shadowsocks
          - anytls
          - vmess
          - vless
          - trojan
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app

      - name: Cache sing-box
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/rustbox-ci-sing-box
          key: sing-box-${{ runner.os }}-${{ runner.arch }}-1.13.14

      - name: Run outbound e2e
        shell: pwsh
        env:
          SING_BOX_CACHE_DIR: ${{ runner.temp }}/rustbox-ci-sing-box
          RUSTBOX_SBOX_OUTBOUND: ${{ matrix.outbound }}
        run: ./scripts/test/outbound.ps1

  # ── E2E gRPC: external grpcurl against control API ───────────
  e2e-grpc:
    name: E2E gRPC (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: rustbox-app-${{ matrix.os }}
          path: target/debug
      - name: Fix permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x target/debug/rustbox-app
      - name: Run gRPC e2e
        shell: pwsh
        run: ./scripts/test/grpc.ps1

  # Native C consumer -> async FFI -> HTTP proxy -> local HTTP target.
  e2e-ffi:
    name: Smoke async FFI HTTP (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Configure MSVC developer environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ffi-e2e
      - name: Run async FFI HTTP data-path smoke
        shell: pwsh
        run: ./scripts/test/ffi.ps1
