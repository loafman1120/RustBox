name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      external_network:
        description: Also check outbound egress through the proxy to https://example.com
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test workspace
        run: cargo test --locked --workspace --all-targets

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Build CLI
        run: cargo build --locked -p rustbox-app

      - name: Control gRPC smoke test
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/ci/control-grpc-smoke.sh

      - name: Curl inbound and outbound proxy smoke test
        if: matrix.os == 'ubuntu-latest'
        env:
          RUSTBOX_CI_EXTERNAL: ${{ github.event_name == 'workflow_dispatch' && inputs.external_network == true && '1' || '0' }}
          RUSTBOX_CI_DUMP_LOGS: "1"
        run: bash scripts/ci/proxy-smoke.sh

      - name: Upload proxy smoke logs
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rustbox-proxy-smoke-logs
          path: target/ci-proxy-smoke/logs
          if-no-files-found: ignore
