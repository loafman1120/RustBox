schema_version = 1

[observability]
level = "info"
# Optional: append structured runtime logs to a file.
# file = "target/rustbox.log"

[[inbounds]]
id = "http"
type = "http-connect"
listen = "127.0.0.1:18080"
# username = "alice"
# password = "secret"

[[inbounds]]
id = "socks"
type = "socks5"
listen = "127.0.0.1:1080"
# username = "alice"
# password = "secret"

[[inbounds]]
id = "mixed"
type = "mixed"
listen = "127.0.0.1:2080"
# username = "alice"
# password = "secret"

[[outbounds]]
id = "direct"
type = "direct"

# Drop matched traffic with a policy rejection.
[[outbounds]]
id = "block"
type = "block"

# Forward through an upstream SOCKS5 proxy.
[[outbounds]]
id = "socks-out"
type = "socks5"
server = "127.0.0.1:1081"
# username = "alice"
# password = "secret"

# Forward through an upstream HTTP CONNECT proxy.
[[outbounds]]
id = "http-out"
type = "http"
server = "proxy.example.test:8080"
# username = "alice"
# password = "secret"

# Forward through an upstream Shadowsocks server.
[[outbounds]]
id = "ss-out"
type = "shadowsocks"
server = "ss.example.test:8388"
method = "aes-128-gcm"
password = "test-password"

# Inline rule-sets can be referenced by ordered route rules.
# [[rule_sets]]
# id = "ads"
# type = "inline"
# rules = [
#   { type = "rule", domain_keyword = ["ads", "tracker"] },
# ]
#
# [[routes]]
# type = "rule"
# inbound = ["http", "mixed"]
# network = ["tcp"]
# domain_suffix = ["example.test"]
# port = [443]
# rule_set = ["ads"]
# outbound = "block"

[[routes]]
type = "default"
outbound = "direct"
