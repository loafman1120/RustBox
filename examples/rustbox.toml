schema_version = 1

[observability]
level = "info"
# Optional: append structured runtime logs to a file.
# file = "target/rustbox.log"

[[inbounds]]
id = "http"
type = "http-connect"
listen = "127.0.0.1:18080"
# username = "alice"
# password = "secret"

[[inbounds]]
id = "socks"
type = "socks5"
listen = "127.0.0.1:1080"
# username = "alice"
# password = "secret"

[[inbounds]]
id = "mixed"
type = "mixed"
listen = "127.0.0.1:2080"
# username = "alice"
# password = "secret"

[[outbounds]]
id = "direct"
type = "direct"

# Drop matched traffic with a policy rejection.
[[outbounds]]
id = "block"
type = "block"

# Forward through an upstream SOCKS5 proxy.
[[outbounds]]
id = "socks-out"
type = "socks5"
server = "127.0.0.1:1081"
# username = "alice"
# password = "secret"

# Forward through an upstream HTTP CONNECT proxy.
[[outbounds]]
id = "http-out"
type = "http"
server = "proxy.example.test:8080"
# username = "alice"
# password = "secret"

# Forward through an upstream Shadowsocks server.
[[outbounds]]
id = "ss-out"
type = "shadowsocks"
server = "ss.example.test:8388"
method = "aes-128-gcm"
password = "test-password"

# Group outbounds are parsed and compiled today. The current runtime uses the
# configured default/first child as a static choice; active switching and
# latency probing are future control-plane work.
# [[outbounds]]
# id = "select"
# type = "selector"
# outbounds = ["direct", "ss-out", "block"]
# default = "direct"
#
# [[outbounds]]
# id = "auto"
# type = "urltest"
# outbounds = ["direct", "ss-out"]
# url = "https://www.gstatic.com/generate_204"
# interval_seconds = 300
# tolerance_ms = 50

# vmess requires AEAD (alter_id = 0) and tcp transport.
# vless is plain only; the `flow` field is rejected by the compiler.
# trojan requires TLS; transport must be tcp.
# anytls uses the pinned protocol-compatible anytls 0.2.3 client; CI covers
# TCP via sing-box and UDP via the in-tree anytls server round-trip.
# [[outbounds]]
# id = "vmess-out"
# type = "vmess"
# server = "vmess.example.test:443"
# uuid = "00000000-0000-0000-0000-000000000001"
# security = "auto"
# alter_id = 0
# transport = "tcp"
# tls = { enabled = true, server_name = "vmess.example.test", alpn = ["h2"] }
#
# [[outbounds]]
# id = "vless-out"
# type = "vless"
# server = "vless.example.test:443"
# uuid = "00000000-0000-0000-0000-000000000002"
# transport = "tcp"
# tls = { enabled = true, server_name = "vless.example.test" }
#
# [[outbounds]]
# id = "trojan-out"
# type = "trojan"
# server = "trojan.example.test:443"
# password = "test-password"
# transport = "tcp"
# tls = { enabled = true, server_name = "trojan.example.test" }
#
# [[outbounds]]
# id = "anytls-out"
# type = "anytls"
# server = "anytls.example.test:443"
# password = "test-password"
# tls = { enabled = true, server_name = "anytls.example.test" }

# Optional DNS plan. This is parsed and validated today; concrete DNS network
# transports are the next adapter step.
# [dns.cache]
# enabled = true
# max_entries = 1024
# min_ttl_seconds = 0
# max_ttl_seconds = 3600
#
# [dns.fake_ip]
# enabled = true
# ipv4_pool = "198.18.0.0/15"
# ttl_seconds = 60
#
# [[dns.servers]]
# id = "cf-doh"
# protocol = "https"
# endpoint = "cloudflare-dns.com:443"
# outbound = "direct"
#
# [[dns.rules]]
# action = "fake-ip"
# domain_suffix = ["example.test"]
# record_type = ["a"]
#
# [[dns.hijack]]
# network = "udp"
# endpoint = "127.0.0.1:53"

# Inline rule-sets can be referenced by ordered route rules.
# [[rule_sets]]
# id = "ads"
# type = "inline"
# rules = [
#   { type = "rule", domain_keyword = ["ads", "tracker"] },
# ]
#
# [[routes]]
# type = "rule"
# inbound = ["http", "mixed"]
# network = ["tcp"]
# domain_suffix = ["example.test"]
# port = [443]
# rule_set = ["ads"]
# outbound = "block"

[[routes]]
type = "default"
outbound = "direct"
