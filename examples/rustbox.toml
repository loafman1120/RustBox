schema_version = 1

[observability]
level = "info"
# output = "console-and-file"
# file = "target/rustbox.log"

[[inbounds]]
id = "http"
type = "http-connect"
listen = "127.0.0.1:18080"
# username = "alice"
# password = "secret"

[[inbounds]]
id = "socks"
type = "socks5"
listen = "127.0.0.1:1080"
# username = "alice"
# password = "secret"

[[inbounds]]
id = "mixed"
type = "mixed"
listen = "127.0.0.1:2080"
# username = "alice"
# password = "secret"

[[outbounds]]
id = "direct"
type = "direct"
# Dial policy is shared by every concrete outbound. `routing_mark` is
# Linux/Android-only; unsupported platform options fail explicitly.
# dial = { bind_interface = "eth0", inet4_bind_address = "192.0.2.10", routing_mark = 255, connect_timeout = "8s", tcp_keep_alive = "5m", tcp_keep_alive_interval = "75s", domain_resolver = "local" }

# Drop matched traffic with a policy rejection.
[[outbounds]]
id = "block"
type = "block"

# Forward through an upstream SOCKS5 proxy.
[[outbounds]]
id = "socks-out"
type = "socks5"
server = "127.0.0.1:1081"
# username = "alice"
# password = "secret"

# Forward through an upstream HTTP CONNECT proxy.
[[outbounds]]
id = "http-out"
type = "http"
server = "proxy.example.test:8080"
# Build a proxy chain by dialing this proxy server through socks-out.
# dial = { detour = "socks-out" }
# username = "alice"
# password = "secret"

# Forward through an upstream Shadowsocks server.
[[outbounds]]
id = "ss-out"
type = "shadowsocks"
server = "ss.example.test:8388"
method = "aes-128-gcm"
password = "test-password"

# Selector outbounds can be inspected and switched through the control gRPC
# API. URLTest is exposed read-only and currently keeps its first child;
# scheduled latency probing remains future work.
# [[outbounds]]
# id = "select"
# type = "selector"
# outbounds = ["direct", "ss-out", "block"]
# default = "direct"
#
# [[outbounds]]
# id = "auto"
# type = "urltest"
# outbounds = ["direct", "ss-out"]
# url = "https://www.gstatic.com/generate_204"
# interval_seconds = 300
# tolerance_ms = 50

# VMess requires AEAD (alter_id = 0). VMess/VLESS/Trojan accept typed
# websocket/http2/grpc/http-upgrade transports. VLESS supports
# flow = "xtls-rprx-vision" with TLS/Reality.
# anytls uses the pinned protocol-compatible anytls 0.2.3 client; CI covers
# TCP via sing-box and UDP via the in-tree anytls server round-trip.
# [[outbounds]]
# id = "vmess-out"
# type = "vmess"
# server = "vmess.example.test:443"
# uuid = "00000000-0000-0000-0000-000000000001"
# security = "auto"
# alter_id = 0
# transport = { type = "websocket", path = "/proxy", host = "vmess.example.test" }
# tls = { enabled = true, server_name = "vmess.example.test", alpn = ["h2"] }
# dial = { multiplex = { enabled = true, protocol = "mux-cool", max_streams = 32, max_connections = 4, buffer_size = 65536 } }
#
# [[outbounds]]
# id = "vless-out"
# type = "vless"
# server = "vless.example.test:443"
# uuid = "00000000-0000-0000-0000-000000000002"
# flow = "xtls-rprx-vision"
# transport = { type = "grpc", service_name = "vless" }
# tls = { enabled = true, server_name = "vless.example.test" }
#
# [[outbounds]]
# id = "trojan-out"
# type = "trojan"
# server = "trojan.example.test:443"
# password = "test-password"
# transport = { type = "http-upgrade", path = "/tunnel" }
# tls = { enabled = true, server_name = "trojan.example.test" }
#
# [[outbounds]]
# id = "anytls-out"
# type = "anytls"
# server = "anytls.example.test:443"
# password = "test-password"
# tls = { enabled = true, server_name = "anytls.example.test" }

# Optional DNS plan. UDP/TCP/DoT/DoH/DoQ transports and route hijack-dns are
# composed into the live runtime.
# [dns.cache]
# enabled = true
# max_entries = 1024
# min_ttl_seconds = 0
# max_ttl_seconds = 3600
#
# [dns.fake_ip]
# enabled = true
# ipv4_pool = "198.18.0.0/15"
# ttl_seconds = 60
#
# [[dns.servers]]
# id = "cf-doh"
# protocol = "https"
# endpoint = "cloudflare-dns.com:443"
# outbound = "direct"
#
# [[dns.rules]]
# action = "fake-ip"
# domain_suffix = ["example.test"]
# record_type = ["a"]
#
# [[dns.hijack]]
# network = "udp"
# endpoint = "127.0.0.1:53"

# Inline rule-sets can be referenced by ordered route rules.
# [[rule_sets]]
# id = "ads"
# type = "inline"
# rules = [
#   { type = "rule", domain_keyword = ["ads", "tracker"] },
# ]
#
# [[routes]]
# type = "rule"
# inbound = ["http", "mixed"]
# network = ["tcp"]
# domain_suffix = ["example.test"]
# port = [443]
# rule_set = ["ads"]
# outbound = "block"

[[routes]]
type = "default"
outbound = "direct"
