schema_version = 1

[observability]
level = "debug"

[[inbounds]]
id = "mixed"
type = "mixed"
listen = "127.0.0.1:17890"

# TUN composes into a packet-to-flow stack. Keep auto_route disabled while
# another VPN is active. For a real full-tunnel run as Administrator on Windows,
# stop the other VPN and set auto_route = true. route_excludes preserve the
# pre-existing best route for matching prefixes.
[[inbounds]]
id = "tun"
type = "tun"
interface_name = "rustbox0"
addresses = ["172.18.0.1/30"]
mtu = 1500
auto_route = false
strict_route = false
route_excludes = ["127.0.0.0/8"]
dns_hijack = [{ endpoint = "1.1.1.1:53", network = "udp" }]
platform_http_proxy = false
auto_redirect = false

[[outbounds]]
id = "direct"
type = "direct"

[[routes]]
type = "default"
outbound = "direct"
