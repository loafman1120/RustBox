schema_version = 1

[observability]
level = "debug"

[[inbounds]]
id = "transparent"
type = "transparent"
listen = "127.0.0.1:12345"
network = "tcp"
mode = "redirect"
auto_rules = false

# TUN configuration is parsed and compiled, but the current composition layer
