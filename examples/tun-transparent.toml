# auto_route = true
# strict_route = false
# route_includes = ["0.0.0.0/0"]
# route_excludes = ["127.0.0.0/8"]

[[outbounds]]
id = "direct"
type = "direct"

[[routes]]
type = "default"
outbound = "direct"
