name: rustbox_flutter
description: Cross-platform Flutter FFI bindings for the RustBox proxy runtime, with precompiled native libraries and a typed lifecycle API.
version: 0.1.3
repository: https://github.com/loafman1120/RustBox
issue_tracker: https://github.com/loafman1120/RustBox/issues
topics:
  - proxy
  - rust
  - ffi
  - networking
  - sing-box

environment:
  sdk: ^3.12.2
  flutter: '>=3.44.0'

dependencies:
  flutter_rust_bridge: '>=2.12.0 <2.13.0'

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
