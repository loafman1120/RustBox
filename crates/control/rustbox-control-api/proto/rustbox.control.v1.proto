syntax = "proto3";

package rustbox.control.v1;

service RustBoxControl {
  rpc GetMetrics(GetMetricsRequest) returns (MetricsSnapshot);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);
  rpc GetObservabilitySnapshot(GetObservabilitySnapshotRequest) returns (ObservabilitySnapshot);
  rpc GetEngineSnapshot(GetEngineSnapshotRequest) returns (EngineSnapshot);
  rpc Stop(StopRequest) returns (EngineSnapshot);
  rpc Reload(ReloadRequest) returns (EngineSnapshot);
  rpc CloseConnection(CloseConnectionRequest) returns (CloseConnectionResponse);
  rpc WatchConnections(WatchConnectionsRequest) returns (stream ConnectionUpdate);
  rpc StreamTraffic(StreamTrafficRequest) returns (stream TrafficSnapshot);
  rpc StreamLogs(StreamLogsRequest) returns (stream Event);
  rpc GetRuntimeStatus(GetRuntimeStatusRequest) returns (RuntimeStatus);
  rpc ListRuleSets(ListRuleSetsRequest) returns (ListRuleSetsResponse);
  rpc RefreshRuleSet(RefreshRuleSetRequest) returns (OperationResponse);
  rpc TriggerUrlTest(TriggerUrlTestRequest) returns (OperationResponse);
}

message GetMetricsRequest {}
message ListConnectionsRequest {}
message GetObservabilitySnapshotRequest {}
message GetEngineSnapshotRequest {}
message StopRequest {}
message ReloadRequest { string config_toml = 1; }
message CloseConnectionRequest { uint64 flow_id = 1; }
message CloseConnectionResponse { bool accepted = 1; }
message WatchConnectionsRequest { bool include_initial = 1; }
message StreamTrafficRequest { uint32 interval_ms = 1; }
message StreamLogsRequest {
  string min_level = 1;
  string target_prefix = 2;
  uint64 flow_id = 3;
}
message GetRuntimeStatusRequest {}
message ListRuleSetsRequest {}
message RefreshRuleSetRequest { string tag = 1; }
message TriggerUrlTestRequest { string group_tag = 1; }
message OperationResponse { bool accepted = 1; string message = 2; }

message QueryEventsRequest {
  string min_level = 1;
  string target_prefix = 2;
  uint64 flow_id = 3;
  uint32 limit = 4;
}

message MetricsSnapshot {
  uint64 services_started = 1;
  uint64 services_stopped = 2;
  uint64 connections_accepted = 3;
  uint64 flows_accepted = 4;
  uint64 flows_active = 5;
  uint64 flows_completed = 6;
  uint64 flows_failed = 7;
  uint64 routes_selected = 8;
  uint64 outbound_connect_attempts = 9;
  uint64 outbound_connect_successes = 10;
  uint64 outbound_connect_failures = 11;
  uint64 inbound_to_outbound_bytes = 12;
  uint64 outbound_to_inbound_bytes = 13;
  uint64 diagnostics = 14;
}

message ConnectionStats {
  uint64 flow_id = 1;
  string source = 2;
  string destination = 3;
  string network = 4;
  ConnectionState state = 5;
  uint64 inbound_to_outbound_bytes = 6;
  uint64 outbound_to_inbound_bytes = 7;
  string outcome = 8;
  string error = 9;
  string inbound = 10;
  string outbound = 11;
}

message ConnectionUpdate {
  ConnectionUpdateKind kind = 1;
  ConnectionStats connection = 2;
  uint64 flow_id = 3;
}

enum ConnectionUpdateKind {
  CONNECTION_UPDATE_KIND_UNSPECIFIED = 0;
  CONNECTION_UPDATE_KIND_SNAPSHOT = 1;
  CONNECTION_UPDATE_KIND_UPSERT = 2;
  CONNECTION_UPDATE_KIND_REMOVE = 3;
}

message TagTraffic {
  string tag = 1;
  uint64 uplink_bytes = 2;
  uint64 downlink_bytes = 3;
}

message TrafficSnapshot {
  uint64 uplink_bytes = 1;
  uint64 downlink_bytes = 2;
  uint64 uplink_bytes_per_second = 3;
  uint64 downlink_bytes_per_second = 4;
  repeated TagTraffic inbounds = 5;
  repeated TagTraffic outbounds = 6;
}

message RuntimeStatus {
  EngineSnapshot engine = 1;
  uint64 uptime_seconds = 2;
  uint64 memory_bytes = 3;
  uint64 active_connections = 4;
  uint64 retained_events = 5;
}

message RuleSetStatus {
  string tag = 1;
  string source = 2;
  string state = 3;
  int64 last_attempt_time = 4;
  int64 last_success_time = 5;
  string last_error = 6;
}

message ListRuleSetsResponse { repeated RuleSetStatus rule_sets = 1; }

enum ConnectionState {
  CONNECTION_STATE_UNSPECIFIED = 0;
  CONNECTION_STATE_ACTIVE = 1;
  CONNECTION_STATE_COMPLETED = 2;
  CONNECTION_STATE_FAILED = 3;
}

message Event {
  string level = 1;
  string target = 2;
  uint64 flow_id = 3;
  string kind = 4;
  string message = 5;
  map<string, string> attributes = 6;
}

message ListConnectionsResponse {
  repeated ConnectionStats connections = 1;
}

message QueryEventsResponse {
  repeated Event events = 1;
}

message ObservabilitySnapshot {
  MetricsSnapshot metrics = 1;
  repeated ConnectionStats connections = 2;
  repeated Event recent_events = 3;
}

message EngineSnapshot {
  EngineState state = 1;
  uint64 generation = 2;
  uint64 inbound_count = 3;
  uint64 outbound_count = 4;
}

enum EngineState {
  ENGINE_STATE_UNSPECIFIED = 0;
  ENGINE_STATE_CREATED = 1;
  ENGINE_STATE_PREPARED = 2;
  ENGINE_STATE_RUNNING = 3;
  ENGINE_STATE_STOPPING = 4;
  ENGINE_STATE_STOPPED = 5;
  ENGINE_STATE_FAILED = 6;
}
