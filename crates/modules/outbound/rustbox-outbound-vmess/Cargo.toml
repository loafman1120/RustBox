[package]
name = "rustbox-outbound-vmess"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
aes = "0.8"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
crc32fast = "1"
hmac = "0.12"
md-5 = "0.10"
rand = "0.9"
rustbox-kernel = { path = "../../../kernel/rustbox-kernel" }
rustbox-io = { path = "../../../foundation/rustbox-io" }
rustbox-runtime-config = { path = "../../../foundation/rustbox-runtime-config" }
rustbox-types = { path = "../../../foundation/rustbox-types" }
rustbox-transport = { path = "../../transport/rustbox-transport" }
rustls = "0.23.41"
sha2 = "0.10"
tokio = { version = "1", features = ["io-util", "rt"] }
tokio-rustls = "0.26.4"
tracing = "0.1"
uuid = "1"

[dev-dependencies]
tokio = { version = "1", features = ["io-util", "macros", "rt-multi-thread", "time"] }

[lints]
workspace = true
