[package]
name = "rustbox-outbound-anytls"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
anytls = { package = "rustbox-anytls", path = "../../protocol/rustbox-anytls", default-features = false, features = ["client"] }
rustbox-kernel = { path = "../../../kernel/rustbox-kernel" }
rustbox-io = { path = "../../../foundation/rustbox-io" }
rustbox-types = { path = "../../../foundation/rustbox-types" }
rustls = "0.23.41"
sha2 = "0.11.0"
tokio = { version = "1", features = ["io-util", "sync", "time"] }
tokio-rustls = "0.26.4"
webpki-roots = "1"

[dev-dependencies]
anytls = { package = "rustbox-anytls", path = "../../protocol/rustbox-anytls", default-features = false, features = ["client", "server"] }
rcgen = { version = "0.14.8", default-features = false, features = ["aws_lc_rs", "pem"] }
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }

[lints]
workspace = true
