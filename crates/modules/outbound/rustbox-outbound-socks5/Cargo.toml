[package]
name = "rustbox-outbound-socks5"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
fast-socks5 = "1.0.0"
rustbox-host-api = { path = "../../../host/rustbox-host-api" }
rustbox-io = { path = "../../../foundation/rustbox-io" }
rustbox-kernel = { path = "../../../kernel/rustbox-kernel" }
rustbox-types = { path = "../../../foundation/rustbox-types" }
tokio = { version = "1", features = ["io-util", "net"] }

[dev-dependencies]
rustbox-inbound-socks5 = { path = "../../inbound/rustbox-inbound-socks5" }
rustbox-outbound-direct = { path = "../rustbox-outbound-direct" }
rustbox-route = { path = "../../../kernel/rustbox-route" }
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread"] }

[lints]
workspace = true
